<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f19" />
  <title>AIカラーチェンジャー</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🎨 AI カラーチェンジャー</h1>
    <p class="subtitle">スマホで撮影 → Gemini が色を変える</p>
  </header>

  <main>
    <!-- 1. APIキー設定 -->
    <section class="card" id="settings">
      <h2>1. Gemini API キー</h2>
      <div class="row">
        <input type="password" id="apiKey" placeholder="AIza... で始まるキーを貼り付け" autocomplete="off" />
        <button id="saveKey" class="btn">保存</button>
      </div>
      <p class="hint">
        キーはこの端末のブラウザ(localStorage)にのみ保存されます。
        <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">キーを取得</a>
      </p>
    </section>

    <!-- 2. 撮影 / 選択 -->
    <section class="card">
      <h2>2. 写真を撮る / 選ぶ</h2>
      <div class="row">
        <label class="btn btn-primary">
          📷 カメラで撮影
          <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden />
        </label>
        <label class="btn">
          🖼️ 画像を選ぶ
          <input type="file" id="galleryInput" accept="image/*" hidden />
        </label>
      </div>
    </section>

    <!-- 3. 変換内容 -->
    <section class="card">
      <h2>3. どんな色に変える？</h2>
      <div class="color-presets" id="presets"></div>
      <input type="text" id="prompt" placeholder="例: 車のボディを鮮やかな赤にして" />
      <button id="convert" class="btn btn-primary btn-block" disabled>✨ 変換する</button>
    </section>

    <!-- 4. 結果 -->
    <section class="card" id="result" hidden>
      <h2>4. 結果</h2>
      <div class="compare">
        <figure>
          <figcaption>元画像</figcaption>
          <img id="beforeImg" alt="元画像" />
        </figure>
        <figure>
          <figcaption>変換後</figcaption>
          <div id="afterWrap">
            <img id="afterImg" alt="変換後" hidden />
            <div id="afterPlaceholder" class="placeholder">ここに結果が出ます</div>
          </div>
        </figure>
      </div>
      <a id="download" class="btn btn-block" download="recolored.png" hidden>⬇️ 変換後を保存</a>
    </section>

    <div id="status" class="status" hidden></div>
  </main>

  <footer class="app-footer">
    <span>Powered by Google Gemini · サンプル / 展示用</span>
  </footer>

  <!-- APIキー設定（任意）。config.js があれば自動でキーを読み込みます。 -->
  <script src="config.js" onerror="console.info('config.js は未設定です（手入力でOK）')"></script>
  <script src="app.js"></script>
</body>
</html>
